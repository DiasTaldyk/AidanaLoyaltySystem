<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seller</title>
    <!-- Font Awesome (белгішелер) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ---------- Негізгі стильдер ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #fdf0ea 0%, #fce4dc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }

        /* ---------- Карточка (негізгі блок) ---------- */
        .seller-card {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 248, 245, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 40px 35px 45px;
            box-shadow: 0 20px 60px rgba(181, 101, 75, 0.25),
                        0 8px 20px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: transform 0.3s;
        }

        .seller-card:hover {
            transform: translateY(-6px);
        }

        /* ---------- Тақырыптар ---------- */
        .seller-card h1 {
            font-size: 32px;
            font-weight: 700;
            color: #3f2825;
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .seller-card h1 i {
            color: #d4886a;
            margin-right: 8px;
        }

        .seller-card h2 {
            font-size: 24px;
            font-weight: 600;
            color: #4a2c2a;
            margin: 30px 0 12px 0;
            border-bottom: 3px dashed #e8c8bc;
            padding-bottom: 8px;
        }

        .seller-card h2 i {
            color: #d4886a;
            margin-right: 10px;
        }

        .seller-card p {
            font-size: 17px;
            color: #6b4c44;
            margin-bottom: 20px;
            text-align: center;
            background: #fbeae3;
            padding: 8px 16px;
            border-radius: 30px;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }

        /* ---------- Батырмалар (ұпай беру) ---------- */
        .sell-btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 16px;
            border: none;
            border-radius: 40px;
            background: #fff;
            box-shadow: 0 4px 12px rgba(181, 101, 75, 0.10);
            font-size: 18px;
            font-weight: 600;
            color: #3f2825;
            text-align: center;
            transition: all 0.25s;
            cursor: pointer;
            border: 2px solid transparent;
            line-height: 1.5;
        }

        .sell-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(181, 101, 75, 0.25);
        }

        .sell-btn:active {
            transform: scale(0.97);
        }

        /* Әр батырманың түсі */
        #btn50 {
            background: #fce4dc;
            border-color: #f0cdc0;
        }
        #btn50:hover {
            background: #fad7cb;
            border-color: #d4886a;
        }

        #btn100 {
            background: #fad7cb;
            border-color: #e8b8a6;
        }
        #btn100:hover {
            background: #f5caba;
            border-color: #b5654b;
        }

        #btn200 {
            background: #f5caba;
            border-color: #dba28c;
        }
        #btn200:hover {
            background: #efbdaa;
            border-color: #8f4d3b;
        }

        .sell-btn br {
            display: none;
        }
        .sell-btn small {
            font-weight: 400;
            font-size: 15px;
            color: #6b4c44;
            display: block;
            margin-top: 2px;
        }

        /* ---------- QR блоктары ---------- */
        #qrBox {
            background: #fff8f5;
            border-radius: 32px;
            padding: 25px 20px 30px;
            margin: 30px 0 20px;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.04), 0 8px 24px rgba(181, 101, 75, 0.08);
            text-align: center;
        }

        #qrBox h2 {
            margin-top: 0;
            border-bottom: none;
            font-size: 22px;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 180px;
            margin: 10px auto;
            background: #fff;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            max-width: 260px;
        }

        #qrInfo {
            margin-top: 12px;
            font-size: 16px;
            color: #6b4c44;
            background: #fbeae3;
            padding: 8px 16px;
            border-radius: 30px;
            display: inline-block;
        }

        /* ---------- Профиль QR ---------- */
        .profile-btn {
            background: #b5654b;
            color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 6px 18px rgba(181, 101, 75, 0.35);
            display: inline-block;
            margin: 8px 0 12px;
        }

        .profile-btn:hover {
            background: #9e4f38;
            transform: scale(1.02);
            box-shadow: 0 8px 28px rgba(181, 101, 75, 0.45);
        }

        .profile-btn:active {
            transform: scale(0.96);
        }

        #profileQr {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 160px;
            margin: 12px auto 0;
            background: #fff;
            border-radius: 24px;
            padding: 20px;
            max-width: 240px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
        }

        /* ---------- Бөлгіш сызық ---------- */
        hr {
            border: none;
            border-top: 3px dashed #e8c8bc;
            margin: 30px 0 20px;
        }

        /* ---------- Адаптивтілік ---------- */
        @media (max-width: 480px) {
            .seller-card {
                padding: 25px 18px 30px;
            }
            .seller-card h1 {
                font-size: 26px;
            }
            .seller-card h2 {
                font-size: 20px;
            }
            .sell-btn {
                font-size: 16px;
                padding: 14px 16px;
            }
            .profile-btn {
                font-size: 16px;
                padding: 12px 22px;
            }
        }
    </style>
</head>
<body>

    <div class="seller-card">

        <h1><i class="fas fa-birthday-cake"></i> Айдана тәттілер әлемі</h1>

        <h2><i class="fas fa-star"></i> Ұпай беру</h2>
        <p>🍭 Сатып алу сомасын таңдаңыз</p>

        <button id="btn50" class="sell-btn">
            🍰 5000 ₸ – 9999 ₸
            <small>⭐ +50 ұпай</small>
        </button>

        <button id="btn100" class="sell-btn">
            🍰 10000 ₸ – 19999 ₸
            <small>⭐ +100 ұпай</small>
        </button>

        <button id="btn200" class="sell-btn">
            🍰 20000 ₸ және жоғары
            <small>⭐ +200 ұпай</small>
        </button>

        <div id="qrBox">
            <h2><i class="fas fa-qrcode"></i> Клиент QR</h2>
            <div id="qrcode"></div>
            <div id="qrInfo"></div>
        </div>

        <hr>

        <h2><i class="fas fa-user-circle"></i> Клиент профилі</h2>
        <button id="profileQrBtn" class="profile-btn">
            <i class="fas fa-qrcode"></i> Профиль QR жасау
        </button>
        <div id="profileQr"></div>

    </div>

    <!-- QR кітапханасы (бір ғана) – функционал өзгерген жоқ -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script type="module" src="js/seller.js"></script>

</body>
</html>
